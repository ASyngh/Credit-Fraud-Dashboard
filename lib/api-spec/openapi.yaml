openapi: 3.1.0
info:
  title: Api
  version: 0.2.0
  description: Credit Card Fraud Detection API with real ML models
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: transactions
    description: Transaction management and fraud detection
  - name: insights
    description: Analytics and insights
  - name: models
    description: ML model information
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /transactions/predict:
    post:
      operationId: predictFraud
      tags: [transactions]
      summary: Predict fraud for a single transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionInput"
      responses:
        "200":
          description: Fraud prediction result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PredictionResult"

  /transactions/upload:
    post:
      operationId: uploadTransactions
      tags: [transactions]
      summary: Upload batch of transactions for fraud analysis
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchTransactionInput"
      responses:
        "200":
          description: Batch prediction results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchPredictionResult"

  /transactions:
    get:
      operationId: listTransactions
      tags: [transactions]
      summary: List recent transactions with fraud flags
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
        - in: query
          name: fraudOnly
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: List of transactions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionListResponse"

  /insights/summary:
    get:
      operationId: getInsightsSummary
      tags: [insights]
      summary: Get overall fraud detection summary stats
      responses:
        "200":
          description: Summary statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsightsSummary"

  /insights/trends:
    get:
      operationId: getInsightsTrends
      tags: [insights]
      summary: Get fraud trend data over time (hourly, from real dataset)
      responses:
        "200":
          description: Trend data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrendsResponse"

  /insights/feature-importance:
    get:
      operationId: getFeatureImportance
      tags: [insights]
      summary: Get feature importance scores for the selected model
      parameters:
        - in: query
          name: model
          schema:
            type: string
            enum: [logistic_regression, random_forest]
            default: random_forest
      responses:
        "200":
          description: Feature importance data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeatureImportanceResponse"

  /insights/pca-analysis:
    get:
      operationId: getPcaAnalysis
      tags: [insights]
      summary: Get PCA feature (V1-V28) statistical analysis from real dataset
      responses:
        "200":
          description: PCA feature analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PcaAnalysisResponse"

  /insights/fraud-patterns:
    get:
      operationId: getFraudPatterns
      tags: [insights]
      summary: Get fraud vs normal transaction pattern comparison
      responses:
        "200":
          description: Fraud patterns data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FraudPatternsResponse"

  /models/info:
    get:
      operationId: getModelsInfo
      tags: [models]
      summary: Get info and metrics for both available ML models
      responses:
        "200":
          description: Model information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelsInfoResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    TransactionInput:
      type: object
      properties:
        amount:
          type: number
        model:
          type: string
          enum: [logistic_regression, random_forest]
          default: random_forest
        v1: { type: number }
        v2: { type: number }
        v3: { type: number }
        v4: { type: number }
        v5: { type: number }
        v6: { type: number }
        v7: { type: number }
        v8: { type: number }
        v9: { type: number }
        v10: { type: number }
        v11: { type: number }
        v12: { type: number }
        v13: { type: number }
        v14: { type: number }
        v15: { type: number }
        v16: { type: number }
        v17: { type: number }
        v18: { type: number }
        v19: { type: number }
        v20: { type: number }
        v21: { type: number }
        v22: { type: number }
        v23: { type: number }
        v24: { type: number }
        v25: { type: number }
        v26: { type: number }
        v27: { type: number }
        v28: { type: number }
        time: { type: number }
        merchantCategory: { type: string }
        hour: { type: integer }
        dayOfWeek: { type: integer }
        distanceFromHome: { type: number }
        cardPresent: { type: boolean }
        onlineTransaction: { type: boolean }
        numTransactionsLast24h: { type: integer }
        avgTransactionAmount: { type: number }
      required: [amount]

    PredictionResult:
      type: object
      properties:
        transactionId: { type: string }
        fraudProbability: { type: number }
        isFraud: { type: boolean }
        riskLevel:
          type: string
          enum: [low, medium, high, critical]
        riskFactors:
          type: array
          items: { type: string }
        confidence: { type: number }
        modelUsed: { type: string }
      required: [transactionId, fraudProbability, isFraud, riskLevel, riskFactors, confidence, modelUsed]

    BatchTransactionInput:
      type: object
      properties:
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/TransactionInput"
        model:
          type: string
          enum: [logistic_regression, random_forest]
          default: random_forest
      required: [transactions]

    BatchPredictionResult:
      type: object
      properties:
        totalProcessed: { type: integer }
        fraudDetected: { type: integer }
        results:
          type: array
          items:
            $ref: "#/components/schemas/PredictionResult"
        processingTimeMs: { type: number }
        modelUsed: { type: string }
      required: [totalProcessed, fraudDetected, results, processingTimeMs, modelUsed]

    Transaction:
      type: object
      properties:
        id: { type: string }
        amount: { type: number }
        merchantCategory: { type: string }
        merchantName: { type: string }
        timestamp: { type: string, format: date-time }
        fraudProbability: { type: number }
        isFraud: { type: boolean }
        riskLevel:
          type: string
          enum: [low, medium, high, critical]
        cardLast4: { type: string }
        location: { type: string }
        modelUsed: { type: string }
      required: [id, amount, merchantCategory, merchantName, timestamp, fraudProbability, isFraud, riskLevel, cardLast4, location, modelUsed]

    TransactionListResponse:
      type: object
      properties:
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/Transaction"
        total: { type: integer }
        page: { type: integer }
      required: [transactions, total, page]

    InsightsSummary:
      type: object
      properties:
        totalTransactions: { type: integer }
        totalFraudDetected: { type: integer }
        fraudRate: { type: number }
        totalAmountAnalyzed: { type: number }
        totalFraudAmount: { type: number }
        avgFraudProbability: { type: number }
        highRiskTransactions: { type: integer }
        savedAmount: { type: number }
        datasetTotalTransactions: { type: integer }
        datasetFraudRate: { type: number }
      required: [totalTransactions, totalFraudDetected, fraudRate, totalAmountAnalyzed, totalFraudAmount, avgFraudProbability, highRiskTransactions, savedAmount, datasetTotalTransactions, datasetFraudRate]

    TrendPoint:
      type: object
      properties:
        hour: { type: integer }
        date: { type: string }
        total: { type: integer }
        fraudCount: { type: integer }
        fraudRate: { type: number }
        amount: { type: number }
      required: [total, fraudCount, fraudRate]

    TrendsResponse:
      type: object
      properties:
        hourly:
          type: array
          items:
            $ref: "#/components/schemas/TrendPoint"
        daily:
          type: array
          items:
            $ref: "#/components/schemas/TrendPoint"
        weekly:
          type: array
          items:
            $ref: "#/components/schemas/TrendPoint"
      required: [hourly, daily, weekly]

    FeatureImportance:
      type: object
      properties:
        feature: { type: string }
        importance: { type: number }
        description: { type: string }
      required: [feature, importance]

    FeatureImportanceResponse:
      type: object
      properties:
        features:
          type: array
          items:
            $ref: "#/components/schemas/FeatureImportance"
        model: { type: string }
      required: [features, model]

    PcaFeatureStat:
      type: object
      properties:
        feature: { type: string }
        fraudMean: { type: number }
        normalMean: { type: number }
        fraudStd: { type: number }
        normalStd: { type: number }
        separation: { type: number }
      required: [feature, fraudMean, normalMean, fraudStd, normalStd, separation]

    PcaAnalysisResponse:
      type: object
      properties:
        features:
          type: array
          items:
            $ref: "#/components/schemas/PcaFeatureStat"
      required: [features]

    FraudPatternsResponse:
      type: object
      properties:
        amountDistribution:
          type: object
          properties:
            fraud:
              type: object
              properties:
                mean: { type: number }
                max: { type: number }
                min: { type: number }
              required: [mean, max, min]
            normal:
              type: object
              properties:
                mean: { type: number }
                max: { type: number }
                min: { type: number }
              required: [mean, max, min]
          required: [fraud, normal]
        fraudRateByHour:
          type: array
          items:
            $ref: "#/components/schemas/TrendPoint"
        datasetSummary:
          type: object
          properties:
            totalTransactions: { type: integer }
            fraudCount: { type: integer }
            normalCount: { type: integer }
            fraudRate: { type: number }
          required: [totalTransactions, fraudCount, normalCount, fraudRate]
      required: [amountDistribution, fraudRateByHour, datasetSummary]

    ModelMetrics:
      type: object
      properties:
        accuracy: { type: number }
        precision: { type: number }
        recall: { type: number }
        f1: { type: number }
        auc: { type: number }
        tp: { type: integer }
        fp: { type: integer }
        tn: { type: integer }
        fn: { type: integer }
      required: [accuracy, precision, recall, f1, auc, tp, fp, tn, fn]

    ModelInfo:
      type: object
      properties:
        type: { type: string }
        description: { type: string }
        metrics:
          $ref: "#/components/schemas/ModelMetrics"
        featureImportance:
          type: array
          items:
            $ref: "#/components/schemas/FeatureImportance"
      required: [type, description, metrics, featureImportance]

    ModelsInfoResponse:
      type: object
      properties:
        logisticRegression:
          $ref: "#/components/schemas/ModelInfo"
        randomForest:
          $ref: "#/components/schemas/ModelInfo"
        datasetInfo:
          type: object
          properties:
            totalRows: { type: integer }
            fraudRows: { type: integer }
            normalRows: { type: integer }
            fraudRate: { type: number }
            features: { type: string }
            trainingNote: { type: string }
          required: [totalRows, fraudRows, normalRows, fraudRate, features, trainingNote]
      required: [logisticRegression, randomForest, datasetInfo]
